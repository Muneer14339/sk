name: pulse_skadi
description: "PulseSkadi - Advanced Shooting Training App"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.5
  vibration: ^3.1.3
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  get_it: ^8.2.0
  injectable: ^2.1.5
  
  
  connectivity_plus: ^7.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  csv: ^6.0.0
  
  # Utils
  intl: ^0.20.2
  logger: ^2.6.1
  url_launcher: ^6.2.2
  
  # Form Validation
  formz: ^0.8.0
  
  
  # UI Components
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  auto_size_text: ^3.0.0
  
  # Animation
  flutter_animate: ^4.2.0
  dartz: ^0.10.1
  flutter_blue_plus: ^1.35.5
  sqflite: ^2.4.2
  cloud_firestore: ^6.0.1
